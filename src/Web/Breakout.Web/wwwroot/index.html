<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bricks Breaker</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="Breakout.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>
    <script>
        globalThis.breakoutStorage = {
            get(key) {
                try {
                    return globalThis.localStorage.getItem(key);
                } catch {
                    return null;
                }
            },
            set(key, value) {
                try {
                    globalThis.localStorage.setItem(key, value);
                } catch {
                }
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        const startupCultureRaw = globalThis.breakoutStorage.get('breakout.lang');
        const startupCulture = startupCultureRaw ? JSON.parse(startupCultureRaw) : undefined;
        Blazor.start({ applicationCulture: startupCulture });
    </script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
