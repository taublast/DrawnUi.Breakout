<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#090b10" />
    <meta name="description" content="Break'em all bricks in a fast arcade brick breaker inspired by Arkanoid and Breakout. Smash bricks, catch powerups, unlock Destroyer mode, and play with touch, keyboard, mouse, or controllers." />
    <meta name="application-name" content="Bricks Breaker" />
    <meta name="apple-itunes-app" content="app-id=6749823869" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bricks Breaker" />
    <meta property="og:title" content="Bricks Breaker | Break'em all bricks!" />
    <meta property="og:description" content="A fast arcade paddle-vs-bricks action game inspired by Arkanoid and Breakout. Catch powerups, trigger Destroyer mode, and play across touch, keyboard, mouse, or controllers." />
    <meta property="og:image" content="/Images/back.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="Bricks Breaker preview image" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bricks Breaker | Break'em all bricks!" />
    <meta name="twitter:description" content="Smash bricks, catch powerups, unlock Destroyer mode, and play a fast arcade brick breaker inspired by Arkanoid and Breakout." />
    <meta name="twitter:image" content="/Images/back.jpg" />
    <title>Bricks Breaker</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preload" href="_content/DrawnUi.Blazor.Core/drawnui-logo.svg" as="image" type="image/svg+xml" />
    <link rel="icon" type="image/svg+xml" href="_content/DrawnUi.Blazor.Core/drawnui-logo.svg" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="_content/DrawnUi.Blazor.Core/drawnui-loader.css" />
    <link href="Breakout.Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <style>
        html, body {
            background: #090b10;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="boot-shell" aria-label="Loading Bricks Breaker">
            <div class="boot-stage">
                <div class="boot-logo-wrap">
                    <img class="boot-logo" src="_content/DrawnUi.Blazor.Core/drawnui-logo.svg" alt="DrawnUI" />
                    <span class="boot-spark" style="--a:15deg;--r:6.8rem;--du:2.1s;--de:0s;--c:#4b8ef9"></span>
                    <span class="boot-spark" style="--a:72deg;--r:6.4rem;--du:1.8s;--de:0.38s;--c:#f25536"></span>
                    <span class="boot-spark" style="--a:138deg;--r:7rem;--du:2.4s;--de:0.72s;--c:#e4a130"></span>
                    <span class="boot-spark" style="--a:195deg;--r:6.2rem;--du:1.9s;--de:1.08s;--c:#78549e"></span>
                    <span class="boot-spark" style="--a:252deg;--r:6.8rem;--du:2.2s;--de:1.44s;--c:#4b8ef9"></span>
                    <span class="boot-spark" style="--a:315deg;--r:6rem;--du:1.7s;--de:0.56s;--c:#f25536"></span>
                    <span class="boot-spark" style="--a:42deg;--r:7.4rem;--du:2.6s;--de:0.92s;--c:#e4a130"></span>
                    <span class="boot-spark" style="--a:172deg;--r:7.6rem;--du:2s;--de:1.6s;--c:#78549e"></span>
                </div>

                <div class="boot-foot">
                    <div class="boot-copy">Bricks Breaker</div>

                    <div class="boot-progress" aria-hidden="true">
                        <div class="boot-progress-track">
                            <div class="boot-progress-fill"></div>
                        </div>
                        <div class="boot-progress-text"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">&#x1F5D9;</span>
    </div>
    <script src="breakout-audio.js"></script>
    <script>
        globalThis.breakoutStorage = {
            get(key) {
                try {
                    return globalThis.localStorage.getItem(key);
                } catch {
                    return null;
                }
            },
            set(key, value) {
                try {
                    globalThis.localStorage.setItem(key, value);
                } catch {
                }
            }
        };

        globalThis.breakoutFullscreen = {
            isEnabled() {
                try {
                    return !!globalThis.document.fullscreenElement;
                } catch {
                    return false;
                }
            },
            setEnabled(enabled) {
                try {
                    if (enabled) {
                        if (!globalThis.document.fullscreenElement) {
                            const target = globalThis.document.documentElement;
                            if (target?.requestFullscreen) {
                                void target.requestFullscreen();
                            }
                        }
                    } else if (globalThis.document.fullscreenElement && globalThis.document.exitFullscreen) {
                        void globalThis.document.exitFullscreen();
                    }
                } catch {
                }
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        const searchParams = new URLSearchParams(globalThis.location.search);
        const loaderPreview = searchParams.has('loader-preview');
        const loaderProgressRaw = Number(searchParams.get('progress'));
        const loaderProgress = Number.isFinite(loaderProgressRaw)
            ? Math.max(0, Math.min(100, loaderProgressRaw))
            : 46;
        const loaderLabel = searchParams.get('label');

        if (loaderPreview) {
            const progressText = loaderLabel || `${Math.floor(loaderProgress)}%`;
            globalThis.document.documentElement.style.setProperty('--blazor-load-percentage', `${loaderProgress}%`);
            globalThis.document.documentElement.style.setProperty('--blazor-load-percentage-text', `"${progressText}"`);
            globalThis.document.body.classList.add('loader-preview');
            globalThis.document.getElementById('blazor-error-ui')?.style.setProperty('display', 'none');
        }

        const startupCultureRaw = globalThis.breakoutStorage.get('breakout.lang');
        const startupCulture = startupCultureRaw ? JSON.parse(startupCultureRaw) : undefined;
        if (!loaderPreview) {
            Blazor.start({ applicationCulture: startupCulture });
        }
    </script>
    <script>
        if (!loaderPreview && 'serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });
        }
    </script>
</body>

</html>
